<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🍽️ Restoran Boshqaruv Tizimi</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="logo">🍽️</span>
      <span class="logo-text">RestaurantPro</span>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-page="dashboard">
        <i class="fas fa-chart-pie"></i><span>Dashboard</span>
      </a>
      <a href="#" class="nav-item" data-page="menu">
        <i class="fas fa-utensils"></i><span>Menyu</span>
      </a>
      <a href="#" class="nav-item" data-page="orders">
        <i class="fas fa-receipt"></i><span>Buyurtmalar</span>
      </a>
      <a href="#" class="nav-item" data-page="payments">
        <i class="fas fa-credit-card"></i><span>To'lovlar</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <span id="clock"></span>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <header class="topbar">
      <button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
      <h1 class="page-title" id="pageTitle">Dashboard</h1>
      <div class="topbar-right">
        <span class="badge-online"><i class="fas fa-circle"></i> Online</span>
      </div>
    </header>

    <!-- PAGES -->
    <div id="page-dashboard" class="page active"></div>
    <div id="page-menu"      class="page"></div>
    <div id="page-orders"    class="page"></div>
    <div id="page-payments"  class="page"></div>
  </main>

  <!-- MODAL OVERLAY -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Modal</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toastContainer"></div>

  <script src="/js/api.js?v=2"></script>
  <script src="/js/utils.js?v=2"></script>
  <script src="/js/pages/dashboard.js?v=2"></script>
  <script src="/js/pages/menu.js?v=2"></script>
  <script src="/js/pages/orders.js?v=2"></script>
  <script src="/js/pages/payments.js?v=2"></script>
  <script src="/js/app.js?v=2"></script>
</body>
</html>
